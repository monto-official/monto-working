; ══════════════════════════════════════════════════════════════════════════════
; Monto AI — Asterisk Dialplan (extensions.conf)
; ══════════════════════════════════════════════════════════════════════════════
;
; Context: monto-calls
;
; Routing:
;   parent calls monto  → rings the Monto AI box
;   monto  calls parent → rings the Parent App browser
;
; Both peers are in the same [monto-calls] context so they can call each other
; using their extension names directly (no PSTN needed).
; ══════════════════════════════════════════════════════════════════════════════

[monto-calls]

; ── Parent → Monto Box ────────────────────────────────────────────────────────
; When the parent app dials "monto" or extension 100
exten => monto,1,NoOp(Parent is calling Monto box)
 same => n,Dial(SIP/monto,30,t)         ; Ring for 30s, allow transfer
 same => n,VoiceMail(monto@default,u)   ; Optional: voicemail if no answer
 same => n,Hangup()

exten => 100,1,Goto(monto-calls,monto,1)

; ── Monto Box → Parent ────────────────────────────────────────────────────────
; When the Monto box dials "parent" or extension 200
exten => parent,1,NoOp(Monto box is calling parent)
 same => n,Dial(SIP/parent,60,t)        ; Ring for 60s
 same => n,Hangup()

exten => 200,1,Goto(monto-calls,parent,1)

; ── Fallback / invalid extension ─────────────────────────────────────────────
exten => i,1,NoOp(Invalid extension dialled)
 same => n,Playback(invalid)
 same => n,Hangup()

exten => t,1,NoOp(Call timed out)
 same => n,Hangup()

; ── Health/test extension ────────────────────────────────────────────────────
; Dial 999 to hear a tone and confirm Asterisk is routing correctly.
exten => 999,1,NoOp(Asterisk test extension)
 same => n,Answer()
 same => n,Playback(demo-congrats)
 same => n,Hangup()
