; ══════════════════════════════════════════════════════════════════════════════
; Monto AI — Asterisk SIP Configuration
; Passwords are substituted from environment variables at container startup
; via the entrypoint.sh script.
; ══════════════════════════════════════════════════════════════════════════════

[general]
transport=udp
disallow=all
allow=ulaw
allow=alaw
allow=opus
defaultexpiry=120
maxexpiry=300
rtptimeout=60
rtpholdtimeout=300
nat=force_rport,comedia
verbose=3
debug=0


; ── Parent App (browser / JsSIP WebRTC) ──────────────────────────────────────
[parent]
type=friend
secret=PARENT_SIP_PASSWORD_PLACEHOLDER
host=dynamic
transport=ws,wss
context=monto-calls
callerid="Parent" <parent>
dtmfmode=rfc2833
disallow=all
allow=ulaw
allow=opus
encryption=yes
avpf=yes
icesupport=yes
directmedia=no


; ── Monto AI Box (Raspberry Pi — UDP SIP) ────────────────────────────────────
[monto]
type=friend
secret=MONTO_SIP_PASSWORD_PLACEHOLDER
host=dynamic
transport=udp
context=monto-calls
callerid="Monto Box" <monto>
dtmfmode=rfc2833
disallow=all
allow=ulaw
allow=alaw
directmedia=no
nat=force_rport,comedia
qualify=yes
