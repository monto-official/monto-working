; ══════════════════════════════════════════════════════════════════════════════
; Asterisk HTTP Server Config (http.conf)
; Required for WebSocket transport (JsSIP in the browser uses this)
; ══════════════════════════════════════════════════════════════════════════════
;
; Place at: /etc/asterisk/http.conf
; After editing: asterisk -rx "module reload http"
;
; The browser connects to:
;   ws://YOUR_ASTERISK_HOST:8088/ws
; ══════════════════════════════════════════════════════════════════════════════

[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088

; For production — use WSS (secure WebSocket) with a TLS cert:
; tlsenable=yes
; tlsbindaddr=0.0.0.0:8089
; tlscertfile=/etc/asterisk/keys/asterisk.crt
; tlsprivatekey=/etc/asterisk/keys/asterisk.key
